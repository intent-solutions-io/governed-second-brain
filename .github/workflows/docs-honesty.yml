# Docs honesty gate — enforce the Governed Second Brain forbidden-words discipline
# on the brand surface (README). ISEDC 009-AT-DECR D1 / CISO bind: a public claim
# may never assert tamper-proof / immutable / non-repudiation / blockchain; the
# trust model is tamper-EVIDENT (integrity + ordering + rewrite-detection). The
# lint allows negated/disclaimer usage (the honest "not tamper-proof" framing).
#
# The three steps run in a deliberate order, weakest trust assumption first:
#   1. `audit-harness verify` — is the linter the REVIEWED one? Compares the pinned sha256 of
#      `scripts/lint-forbidden-words.sh` and exits 2 = HARNESS_TAMPERED on a mismatch. The linter
#      is the artifact trusted to enforce the honesty binding, so an unreviewed edit to it must
#      fail the job BEFORE its verdict is believed.
#   2. self-test — is the linter, authentic or not, still DETECTING what it claims to?
#   3. the lint itself — is the README clean?
# Step 1 catches a swapped-out linter; step 2 catches an authentic but broken one. Neither
# subsumes the other, which is why both run.
#
# After any REVIEWED edit to the linter, re-pin with `./scripts/audit-harness init` and commit the
# updated `.harness-hash`, or step 1 fails closed. See `.harness-hash-extra-patterns` for why that
# file — and only that file — is pinned.
name: docs-honesty

on:
  push:
    branches: [main]
    paths:
      [
        'README.md',
        'scripts/lint-forbidden-words.sh',
        'scripts/test-lint-forbidden-words.sh',
        'scripts/audit-harness',
        '.audit-harness/**',
        '.harness-hash',
        '.harness-hash-extra-patterns',
        '.github/workflows/docs-honesty.yml',
      ]
  pull_request:
    paths:
      [
        'README.md',
        'scripts/lint-forbidden-words.sh',
        'scripts/test-lint-forbidden-words.sh',
        'scripts/audit-harness',
        '.audit-harness/**',
        '.harness-hash',
        '.harness-hash-extra-patterns',
        '.github/workflows/docs-honesty.yml',
      ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  forbidden-words:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Enforcement travels with the code — the in-repo vendored harness, never a ~/.claude/ path
      # (IS Testing SOP). This repo is docs + shell + python with no package.json, so it uses the
      # vendored install rather than a Node dev dep.
      - name: Verify hash-pinned enforcement artifacts (audit-harness)
        run: ./scripts/audit-harness verify

      - name: Self-test the lint (all three check classes, incl. chain-conflation)
        run: bash scripts/test-lint-forbidden-words.sh

      - name: Lint README for forbidden claim-words
        run: bash scripts/lint-forbidden-words.sh README.md
